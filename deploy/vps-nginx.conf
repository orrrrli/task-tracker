# tasks.orlando.codes — Frontend
# Cloudflare handles SSL; nginx proxies HTTP from Cloudflare to the container
server {
    listen 80;
    server_name tasks.orlando.codes;

    location / {
        proxy_pass http://127.0.0.1:3009;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# tasksapi.orlando.codes — API
server {
    listen 80;
    server_name tasksapi.orlando.codes;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
