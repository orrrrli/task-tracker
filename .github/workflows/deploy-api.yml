name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'TaskTrackerAPI/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy-api.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/task-tracker-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./TaskTrackerAPI
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /home/rokev-dynamics/TaskTracker/
          strip_components: 0

      - name: Deploy API on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            printf "DB_CONNECTION_STRING=%s\n" \
              "${{ secrets.DB_CONNECTION_STRING }}" \
              > /home/rokev-dynamics/TaskTracker/.env

            echo "${{ secrets.GH_PAT }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd /home/rokev-dynamics/TaskTracker
            docker compose -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.prod.yml up -d api
